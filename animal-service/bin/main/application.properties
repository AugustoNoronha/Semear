micronaut.application.name=animal-service
micronaut.server.port=8081

datasources.default.url=jdbc:postgresql://localhost:5432/semear
datasources.default.username=postgres
datasources.default.password=postgres
datasources.default.driverClassName=org.postgresql.Driver

jpa.default.properties.hibernate.hbm2ddl.auto=none
jpa.default.properties.hibernate.show_sql=true

flyway.datasources.default.enabled=false

micronaut.http.services.user-service.url=http://localhost:8080
micronaut.http.services.user-service.read-timeout=1s

logger.level.io.micronaut.http.client=TRACE

# Swagger
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**
micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/swagger/views/swagger-ui
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui/**
